<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ phone.name }}</title>
</head>
<body>

    <h1>{{ phone.name }}</h1>

    <p><b>Brand:</b> {{ phone.brand }}</p>
    <p><b>Price:</b> {{ phone.price }}</p>
    <p><b>Storage:</b> {{ phone.storage }} GB</p>
    <p><b>Color:</b> {{ phone.color }}</p>

    <form action="{% url 'phone_delete' phone.id %}" method="POST">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>

    <br>

    <a href="{% url 'phone_list' %}">Back</a>

</body>
</html>
